<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> 凌云智能 - 生意助手 </title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="../css/font-awesome.min.css" />
  <link rel="stylesheet" href="css/style.css" />

  <!--
    importmap：把裸说明符 'vue' 映射到 ESM CDN
    备选 CDN（unpkg 偶发超时时切换）：
      https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.prod.js
    或本地：把同名文件下载到 chat/js/vendor/，把下面的 URL 改成 './js/vendor/vue.esm-browser.prod.js'
  -->
  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.prod.js"
      }
    }
  </script>
</head>
<body>
  <!-- Vue 根挂载点；所有视图均由组件渲染 -->
  <div id="app"></div>

  <!-- ESM 模块入口；必须经 HTTP 服务访问，file:// 双击会报错 -->
  <script type="module" src="js/main.js"></script>

  <noscript>
    本页需要启用 JavaScript（且需要支持 ES Modules 的现代浏览器）。
  </noscript>
</body>
</html>
