<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
  <defs>
    <linearGradient id="bgCL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#eef2fb"/>
      <stop offset="0.55" stop-color="#e2e8f7"/>
      <stop offset="1"    stop-color="#ecd9f4"/>
    </linearGradient>
    <linearGradient id="crestAL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#1e3a8a" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#1e3a8a" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#1e3a8a" stop-opacity="0.95"/>
      <stop offset="1"    stop-color="#1e3a8a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="crestBL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#5b21b6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5b21b6" stop-opacity="0.9"/>
      <stop offset="1"   stop-color="#5b21b6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="crestCL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#9d174d" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#9d174d" stop-opacity="0.85"/>
      <stop offset="1"   stop-color="#9d174d" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowCL" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgCL)"/>

  <!-- background soft crests (no glow, deeper for visibility) -->
  <g fill="none" opacity="0.55">
    <path d="M-100,300 C300,200 700,420 1000,300 S1620,200 2020,320" stroke="#3b5da3" stroke-width="1.2"/>
    <path d="M-100,380 C300,280 700,500 1000,380 S1620,280 2020,400" stroke="#3b5da3" stroke-width="1.2"/>
    <path d="M-100,820 C300,720 700,940 1000,820 S1620,720 2020,840" stroke="#7e57c2" stroke-width="1.2"/>
    <path d="M-100,900 C300,800 700,1020 1000,900 S1620,800 2020,920" stroke="#7e57c2" stroke-width="1.2"/>
  </g>

  <!-- main crests (deep starry blue/purple, with subtle glow) -->
  <g fill="none" filter="url(#glowCL)">
    <path d="M-100,520 C260,400 640,640 1000,520 S1660,400 2020,540" stroke="url(#crestAL)" stroke-width="2.6"/>
    <path d="M-100,600 C260,480 640,720 1000,600 S1660,480 2020,620" stroke="url(#crestBL)" stroke-width="2.2"/>
    <path d="M-100,680 C260,560 640,800 1000,680 S1660,560 2020,700" stroke="url(#crestCL)" stroke-width="2"/>
    <path d="M-100,440 C260,320 640,560 1000,440 S1660,320 2020,460" stroke="url(#crestAL)" stroke-width="1.6"/>
  </g>

  <!-- highlight points (deep dots like distant stars) -->
  <g>
    <circle cx="320"  cy="500" r="2.4" fill="#1e3a8a" opacity="0.85"/>
    <circle cx="780"  cy="600" r="2"   fill="#5b21b6" opacity="0.75"/>
    <circle cx="1240" cy="540" r="2.6" fill="#1e3a8a" opacity="0.85"/>
    <circle cx="1620" cy="640" r="2"   fill="#5b21b6" opacity="0.75"/>
    <circle cx="540"  cy="700" r="1.8" fill="#9d174d" opacity="0.7"/>
    <circle cx="1080" cy="460" r="1.6" fill="#1e3a8a" opacity="0.7"/>
    <circle cx="1480" cy="720" r="1.8" fill="#5b21b6" opacity="0.7"/>
  </g>
</svg>
