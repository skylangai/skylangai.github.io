<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
  <defs>
    <style><![CDATA[
      .flow { transform-origin: 50% 50%; animation: flowDrift 18s ease-in-out infinite alternate; }
      .flow-2 { animation-duration: 22s; animation-direction: alternate-reverse; }
      .flow-3 { animation-duration: 26s; }
      .flow-4 { animation-duration: 30s; animation-direction: alternate-reverse; }
      @keyframes flowDrift {
        0%   { transform: translateX(-40px); }
        100% { transform: translateX(40px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .flow { animation: none; }
      }
    ]]></style>
    <linearGradient id="slideBgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0a1535"/>
      <stop offset="0.5" stop-color="#152357"/>
      <stop offset="1"   stop-color="#1d2f73"/>
    </linearGradient>
    <linearGradient id="lineBA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#5c8df6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7aa6ff" stop-opacity="1"/>
      <stop offset="1"   stop-color="#5c8df6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineBB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#9b7bff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#b89bff" stop-opacity="1"/>
      <stop offset="1"   stop-color="#9b7bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineBC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#5be3d7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7df0e6" stop-opacity="1"/>
      <stop offset="1"   stop-color="#5be3d7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#slideBgB)"/>

  <g class="flow flow-1" fill="none" stroke="url(#lineBA)" stroke-width="1.6" opacity="0.85">
    <path d="M-200,420 C200,300 500,540 900,420 S1500,300 2120,420"/>
    <path d="M-200,460 C200,340 500,580 900,460 S1500,340 2120,460"/>
    <path d="M-200,500 C200,380 500,620 900,500 S1500,380 2120,500"/>
  </g>
  <g class="flow flow-2" fill="none" stroke="url(#lineBB)" stroke-width="1.4" opacity="0.7">
    <path d="M-200,620 C220,520 540,720 920,620 S1520,520 2120,620"/>
    <path d="M-200,660 C220,560 540,760 920,660 S1520,560 2120,660"/>
    <path d="M-200,700 C220,600 540,800 920,700 S1520,600 2120,700"/>
  </g>
  <g class="flow flow-3" fill="none" stroke="url(#lineBC)" stroke-width="1.2" opacity="0.65">
    <path d="M-200,820 C240,740 560,900 940,820 S1540,740 2120,820"/>
    <path d="M-200,860 C240,780 560,940 940,860 S1540,780 2120,860"/>
  </g>
  <g class="flow flow-4" fill="none" stroke="url(#lineBA)" stroke-width="1" opacity="0.55">
    <path d="M-200,240 C200,160 500,340 900,240 S1500,160 2120,240"/>
    <path d="M-200,280 C200,200 500,380 900,280 S1500,200 2120,280"/>
  </g>

  <g fill="#cfe0ff" opacity="0.6">
    <circle cx="180"  cy="200" r="1.6"/>
    <circle cx="420"  cy="350" r="1.2"/>
    <circle cx="760"  cy="180" r="1.8"/>
    <circle cx="1120" cy="290" r="1.3"/>
    <circle cx="1440" cy="160" r="1.5"/>
    <circle cx="1700" cy="320" r="1.1"/>
    <circle cx="300"  cy="780" r="1.4"/>
    <circle cx="640"  cy="900" r="1.2"/>
    <circle cx="1020" cy="820" r="1.6"/>
    <circle cx="1380" cy="940" r="1.3"/>
    <circle cx="1620" cy="760" r="1.5"/>
  </g>
</svg>
