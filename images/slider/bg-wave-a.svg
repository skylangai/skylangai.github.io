<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="none">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf2ff"/>
      <stop offset="1" stop-color="#d8e6f7"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgA)"/>

  <!-- bottom layer: thicker, darker waves -->
  <g fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M0,720 C200,640 380,800 580,720 S960,640 1180,720 1420,800 1600,700"
          stroke="#5d8bc7" stroke-width="2"/>
    <path d="M0,760 C220,680 400,840 600,760 S980,680 1200,760 1440,820 1600,740"
          stroke="#6d97cf" stroke-width="1.6"/>
    <path d="M0,640 C200,560 400,720 600,640 S980,560 1200,640 1440,700 1600,620"
          stroke="#85aadb" stroke-width="1.4"/>
  </g>

  <!-- mid layer -->
  <g fill="none" stroke-linecap="round" opacity="0.4">
    <path d="M0,500 C220,420 420,580 620,500 S1020,420 1220,500 1440,560 1600,480"
          stroke="#9abce2" stroke-width="1.3"/>
    <path d="M0,420 C200,340 400,500 600,420 S1000,340 1220,420 1440,480 1600,400"
          stroke="#a8c6e7" stroke-width="1.1"/>
    <path d="M0,560 C220,480 440,640 640,560 S1040,480 1240,560 1460,620 1600,540"
          stroke="#b3cdec" stroke-width="1"/>
  </g>

  <!-- top layer: faint waves -->
  <g fill="none" stroke-linecap="round" opacity="0.3">
    <path d="M0,300 C200,220 420,360 620,280 S1020,220 1220,300 1440,360 1600,280"
          stroke="#a8c6e7" stroke-width="1"/>
    <path d="M0,200 C220,120 420,260 620,180 S1020,120 1220,200 1440,260 1600,180"
          stroke="#b8d3f0" stroke-width="0.9"/>
    <path d="M0,100 C200,40 400,160 600,90 S1000,30 1220,100 1440,160 1600,80"
          stroke="#c8ddf3" stroke-width="0.8"/>
  </g>
</svg>
