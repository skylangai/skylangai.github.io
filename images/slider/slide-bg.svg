<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0c1a3d"/>
      <stop offset="0.55" stop-color="#1a2a66"/>
      <stop offset="1"    stop-color="#3a1f6e"/>
    </linearGradient>
    <!-- Gradients use absolute viewBox coords (userSpaceOnUse) so x1/x2 can be
         animated as a moving "light packet" sliding across the path. -->
    <linearGradient id="crestA" gradientUnits="userSpaceOnUse" x1="-800" y1="0" x2="0" y2="0">
      <stop offset="0"    stop-color="#3eb6ff" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#6dd1ff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#6dd1ff" stop-opacity="1"/>
      <stop offset="1"    stop-color="#3eb6ff" stop-opacity="0"/>
      <animate attributeName="x1" from="-800" to="1920" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="0"    to="2720" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="crestB" gradientUnits="userSpaceOnUse" x1="-800" y1="0" x2="0" y2="0">
      <stop offset="0"   stop-color="#b06bff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#d4a4ff" stop-opacity="1"/>
      <stop offset="1"   stop-color="#b06bff" stop-opacity="0"/>
      <animate attributeName="x1" from="-800" to="1920" dur="6s" begin="-2s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="0"    to="2720" dur="6s" begin="-2s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="crestC" gradientUnits="userSpaceOnUse" x1="-800" y1="0" x2="0" y2="0">
      <stop offset="0"   stop-color="#ff7ad8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff9be0" stop-opacity="1"/>
      <stop offset="1"   stop-color="#ff7ad8" stop-opacity="0"/>
      <animate attributeName="x1" from="-800" to="1920" dur="6s" begin="-4s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="0"    to="2720" dur="6s" begin="-4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glowC" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgC)"/>

  <!-- background soft crests (no glow) -->
  <g fill="none" opacity="0.35">
    <path d="M-100,300 C300,200 700,420 1000,300 S1620,200 2020,320" stroke="#6dd1ff" stroke-width="1"/>
    <path d="M-100,380 C300,280 700,500 1000,380 S1620,280 2020,400" stroke="#6dd1ff" stroke-width="1"/>
    <path d="M-100,820 C300,720 700,940 1000,820 S1620,720 2020,840" stroke="#d4a4ff" stroke-width="1"/>
    <path d="M-100,900 C300,800 700,1020 1000,900 S1620,800 2020,920" stroke="#d4a4ff" stroke-width="1"/>
  </g>

  <!-- glowing crests -->
  <g fill="none" filter="url(#glowC)">
    <path d="M-100,520 C260,400 640,640 1000,520 S1660,400 2020,540" stroke="url(#crestA)" stroke-width="2.4"/>
    <path d="M-100,600 C260,480 640,720 1000,600 S1660,480 2020,620" stroke="url(#crestB)" stroke-width="2"/>
    <path d="M-100,680 C260,560 640,800 1000,680 S1660,560 2020,700" stroke="url(#crestC)" stroke-width="1.8"/>
    <path d="M-100,440 C260,320 640,560 1000,440 S1660,320 2020,460" stroke="url(#crestA)" stroke-width="1.4"/>
  </g>

  <!-- highlight points -->
  <g filter="url(#glowC)">
    <circle cx="320"  cy="500" r="2.4" fill="#ffffff" opacity="0.85"/>
    <circle cx="780"  cy="600" r="2"   fill="#ffffff" opacity="0.7"/>
    <circle cx="1240" cy="540" r="2.6" fill="#ffffff" opacity="0.85"/>
    <circle cx="1620" cy="640" r="2"   fill="#ffffff" opacity="0.7"/>
    <circle cx="540"  cy="700" r="1.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="1080" cy="460" r="1.6" fill="#ffffff" opacity="0.6"/>
    <circle cx="1480" cy="720" r="1.8" fill="#ffffff" opacity="0.6"/>
  </g>
</svg>
